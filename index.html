<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Beautrì Srl</title>
    <link rel="icon" type="image/png" href="https://beautri.it/wp-content/uploads/2020/02/cropped-favicon_beautri-270x270.png">
    <link rel="apple-touch-icon" href="https://beautri.it/wp-content/uploads/2020/02/cropped-favicon_beautri-270x270.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
 
      body {
        font-family: 'Montserrat', sans-serif;
        background-color: #FDFDFD;
        color: #292524;
        min-height: 100vh;
        width: 100vw;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
      }
 
      /* ── Grid ── */
      .product-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        width: 100%;
        max-width: 420px;
      }
 
      /* ── Card ── */
      .product-card {
        display: block;
        text-decoration: none;
        background: #FFFFFF;
        border: 0.5px solid rgba(41,37,36,0.12);
        border-radius: 16px;
        overflow: hidden;
        position: relative;
        cursor: pointer;
        aspect-ratio: 1 / 1.15;
        transition: transform 0.22s cubic-bezier(0.34,1.3,0.64,1),
                    box-shadow 0.22s ease,
                    border-color 0.2s ease;
        -webkit-tap-highlight-color: transparent;
      }
 
      .product-card:hover {
        transform: translateY(-3px) scale(1.015);
        box-shadow: 0 8px 28px rgba(41,37,36,0.1);
        border-color: rgba(201,162,39,0.4);
      }
 
      .product-card:active {
        transform: scale(0.97);
        box-shadow: none;
      }
 
      .product-card img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        display: block;
        padding: 12%;
        transition: transform 0.3s ease;
      }
 
      .product-card:hover img {
        transform: scale(1.04);
      }
 
      /* gold accent bottom */
      .product-card::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 12%;
        width: 76%;
        height: 2px;
        background: #C9A227;
        border-radius: 2px;
        opacity: 0;
        transition: opacity 0.25s ease;
      }
 
      .product-card:hover::after {
        opacity: 1;
      }
 
      /* play badge */
      .play-badge {
        position: absolute;
        bottom: 10px;
        right: 10px;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgba(41,37,36,0.65);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.22s ease;
      }
 
      .play-badge svg {
        width: 10px;
        height: 10px;
        fill: #FDFDFD;
        margin-left: 2px;
      }
 
      .product-card:hover .play-badge {
        opacity: 1;
      }
 
      @media (max-width: 380px) {
        .product-grid { gap: 0.75rem; }
      }
 
      @media (min-width: 540px) {
        .product-grid { max-width: 480px; gap: 1.25rem; }
      }
    </style>
  </head>
  <body>
 
    <div class="product-grid">
 
      <!-- 1 · Shampoo -->
      <a class="product-card" href="shampoo.html" aria-label="Shampoo">
        <img src="https://raw.githubusercontent.com/DenirAdobati/listino-beautri-/main/Shampoo.png" alt="Beautrì Shampoo" loading="eager" />
        <div class="play-badge" aria-hidden="true"><svg viewBox="0 0 10 10"><polygon points="1,0 10,5 1,10"/></svg></div>
      </a>
 
      <!-- 2 · Lozione -->
      <a class="product-card" href="lozione.html" aria-label="Lozione">
        <img src="https://raw.githubusercontent.com/DenirAdobati/listino-beautri-/main/Lozione.png" alt="Beautrì Lozione" loading="eager" />
        <div class="play-badge" aria-hidden="true"><svg viewBox="0 0 10 10"><polygon points="1,0 10,5 1,10"/></svg></div>
      </a>
 
      <!-- 3 · Conditioner -->
      <a class="product-card" href="conditioner.html" aria-label="Conditioner">
        <img src="https://raw.githubusercontent.com/DenirAdobati/listino-beautri-/main/Conditioner.png" alt="Beautrì Conditioner" loading="eager" />
        <div class="play-badge" aria-hidden="true"><svg viewBox="0 0 10 10"><polygon points="1,0 10,5 1,10"/></svg></div>
      </a>
 
      <!-- 4 · Emulsione Lenitiva -->
      <a class="product-card" href="emulsione-lenitiva.html" aria-label="Emulsione Lenitiva">
        <img src="https://raw.githubusercontent.com/DenirAdobati/listino-beautri-/main/Emulsione%20lenitiva.png" alt="Beautrì Emulsione Lenitiva" loading="eager" />
        <div class="play-badge" aria-hidden="true"><svg viewBox="0 0 10 10"><polygon points="1,0 10,5 1,10"/></svg></div>
      </a>
 
      <!-- 5 · Emulsione Avvolgente -->
      <a class="product-card" href="emulsione-avvolgente.html" aria-label="Emulsione Avvolgente">
        <img src="https://raw.githubusercontent.com/DenirAdobati/listino-beautri-/main/Emulsione%20avvolgente.png" alt="Beautrì Emulsione Avvolgente" loading="eager" />
        <div class="play-badge" aria-hidden="true"><svg viewBox="0 0 10 10"><polygon points="1,0 10,5 1,10"/></svg></div>
      </a>
 
      <!-- 6 · Maschera -->
      <a class="product-card" href="maschera.html" aria-label="Maschera">
        <img src="https://raw.githubusercontent.com/DenirAdobati/listino-beautri-/main/Masschera.png" alt="Beautrì Maschera" loading="eager" />
        <div class="play-badge" aria-hidden="true"><svg viewBox="0 0 10 10"><polygon points="1,0 10,5 1,10"/></svg></div>
      </a>
 
    </div>
 
  </body>
</html>
 
 
<!-- WHATSAPP WIDGET -->
<style>
  .wa-float {
    position: fixed;
    bottom: 1.4rem;
    right: 1.2rem;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.6rem;
  }
 
  .wa-bubble {
    background: #1A1A1A;
    color: #FFFFFF;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 0.5rem 0.9rem;
    border-radius: 2rem;
    white-space: nowrap;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    opacity: 0;
    transform: translateY(4px);
    animation: bubble-in 0.4s ease 1s forwards;
  }
 
  @keyframes bubble-in {
    to { opacity: 1; transform: translateY(0); }
  }
 
  .wa-link {
    display: block;
    width: 60px;
    height: 60px;
    text-decoration: none;
    opacity: 0;
    animation: icon-in 0.45s cubic-bezier(0.34,1.56,0.64,1) 0.5s forwards,
               wa-ring 2.5s ease-in-out 2s infinite;
    border-radius: 50%;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
 
  @keyframes icon-in {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 1; transform: scale(1); }
  }
 
  @keyframes wa-ring {
    0%, 100% { filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3)) drop-shadow(0 0 0px rgba(37,211,102,0)); }
    50%       { filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3)) drop-shadow(0 0 10px rgba(37,211,102,0.5)); }
  }
 
  .wa-link:hover {
    transform: scale(1.1);
  }
 
  .wa-link:active {
    transform: scale(0.95);
  }
 
  .wa-link img {
    width: 60px;
    height: 60px;
    object-fit: contain;
    display: block;
  }
</style>
 
<div class="wa-float">
  <div class="wa-bubble">Hai bisogno di aiuto con il tuo prodotto?</div>
  <a
    class="wa-link"
    href="https://wa.me/393313348233"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Contattaci su WhatsApp"
  >
    <img
      src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
      alt="WhatsApp"
    />
  </a>
</div>
